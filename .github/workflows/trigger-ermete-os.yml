name: Trigger Downstream Ermete OS
on:
  workflow_run:
    workflows:
      - "🌋 Ermete Forge Orchestrator"
    types:
      - completed

jobs:
  trigger:
    runs-on: self-hosted
    if: ${{ contains(fromJson('["success", "failure"]'), github.event.workflow_run.conclusion) }}
    steps:
      - name: Dispatch to Ermete OS
        run: |
          # Use PAT_TOKEN secret or fallback to local runner token
          TOKEN="${{ secrets.PAT_TOKEN }}"
          if [ -z "$TOKEN" ]; then
            TOKEN=$(cat $HOME/.github_token || echo "")
          fi
          if [ -z "$TOKEN" ]; then
             echo "Error: No token available to trigger downstream."
             exit 1
          fi
          curl -f -s -S -X POST https://api.github.com/repos/${{ github.repository_owner }}/ermete/dispatches \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: Bearer $TOKEN" \
          -d '{"event_type": "forge-updated"}'
